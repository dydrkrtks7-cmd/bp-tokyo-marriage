<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="647" cy="405" r="59" fill="#0a1628" opacity="0.08"/>
    <circle cx="661" cy="397" r="23" fill="#0a1628" opacity="0.19"/>
    <circle cx="718" cy="520" r="82" fill="#0a1628" opacity="0.07"/>
    <circle cx="40" cy="507" r="30" fill="#0a1628" opacity="0.16"/>
    <circle cx="1278" cy="425" r="46" fill="#0a1628" opacity="0.20"/>
    <circle cx="1191" cy="120" r="40" fill="#0a1628" opacity="0.16"/>
    <rect x="1115" y="705" width="44" height="45" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(38, 550, 723)"/>
    <rect x="846" y="18" width="70" height="35" rx="8" fill="#0d2137" opacity="0.15" transform="rotate(12, 229, 91)"/>
    <rect x="884" y="615" width="96" height="20" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(24, 1108, 174)"/>
    <rect x="774" y="551" width="69" height="43" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(0, -86, 448)"/>
    <rect x="1071" y="659" width="33" height="78" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(22, 456, 145)"/>
    <rect x="916" y="597" width="57" height="61" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(16, 640, 588)"/>
    <rect x="1164" y="304" width="62" height="31" rx="8" fill="#0d2137" opacity="0.11" transform="rotate(12, 281, 115)"/>
    <rect x="-29" y="218" width="85" height="82" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(12, 81, 3)"/>
    <polygon points="1114,85 1213,283 1015,283" fill="#0a1628" opacity="0.12"/>
    <polygon points="1185,464 1261,616 1109,616" fill="#0a1628" opacity="0.10"/>
    <polygon points="735,272 830,462 640,462" fill="#0a1628" opacity="0.05"/>
    <polygon points="923,147 948,197 898,197" fill="#0a1628" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,570 C360,600 840,540 1200,570 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    발산 셔츠룸 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    발산 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    발산 발산 셔츠룸 추천정보 — 셔츠룸
  </text>
</svg>